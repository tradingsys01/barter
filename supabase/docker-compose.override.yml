## Local-dev overrides for Quadra Barter.
##
## Adds Mailpit as a local SMTP catcher so Supabase Auth can deliver
## magic-link emails. Open http://localhost:8025 to read them.
##
## docker-compose auto-merges this file with docker-compose.yml
## when both are present.

services:
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: supabase-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  auth:
    environment:
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: "1025"
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@localhost
      GOTRUE_SMTP_SENDER_NAME: Quadra Barter (dev)
      # Dev only: lift the per-hour magic-link cap so heavy e2e suites don't
      # trip GoTrue's rate limiter. Production keeps the default.
      GOTRUE_RATE_LIMIT_EMAIL_SENT: "10000"
    depends_on:
      mailpit:
        condition: service_started
