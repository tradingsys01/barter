# Umami analytics — add to /etc/nginx/sites-available/barter
# After adding, run: sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS redirect (add analytics subdomain to existing server block, or use this)
server {
    listen 80;
    server_name analytics.barter.asterivo.ca;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# Umami dashboard
server {
    listen 443 ssl http2;
    server_name analytics.barter.asterivo.ca;
    ssl_certificate     /etc/letsencrypt/live/analytics.barter.asterivo.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.barter.asterivo.ca/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
